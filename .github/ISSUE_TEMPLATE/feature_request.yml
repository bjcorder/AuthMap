name: Feature request
description: Propose a product, CLI, CI, or reporting enhancement.
title: "Feature: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What product-security or developer workflow should this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: checkboxes
    id: boundaries
    attributes:
      label: Scope check
      options:
        - label: This is for defensive, authorized analysis.
          required: true
        - label: This does not require running or attacking a live target system.
          required: true
