name: Detection improvement
description: Suggest a new framework, guard, route, evidence, or mutation pattern.
title: "Detection: "
labels: ["enhancement", "detection"]
body:
  - type: markdown
    attributes:
      value: |
        Please keep examples sanitized. AuthMap is for defensive, authorized analysis only.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Route discovery
        - Authentication evidence
        - Authorization evidence
        - Ownership or tenant evidence
        - ORM or data mutation
        - Reachability linking
        - Coverage classification
        - Reporting
    validations:
      required: true
  - type: input
    id: framework
    attributes:
      label: Framework or library
      placeholder: "FastAPI, Django/DRF, Express, Next.js, SQLAlchemy, Prisma"
    validations:
      required: true
  - type: textarea
    id: pattern
    attributes:
      label: Sanitized pattern
      description: Show the smallest safe example that demonstrates the pattern.
      render: text
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected AuthMap output
      placeholder: "Route, evidence type, mutation, coverage class, diagnostic, or report behavior."
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: Why this is server-side authorization evidence
    validations:
      required: false
