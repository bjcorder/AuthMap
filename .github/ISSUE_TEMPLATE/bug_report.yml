name: Bug report
description: Report a reproducible AuthMap bug.
title: "Bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve AuthMap. Do not include credentials, customer code, exploit payloads, or sensitive vulnerability details.
  - type: input
    id: version
    attributes:
      label: AuthMap version or commit
      placeholder: "v1.0.0 or commit SHA"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "OS, shell, install method"
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command and sanitized output
      render: text
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: fixture
    attributes:
      label: Minimal sanitized fixture or code shape
      description: Include only non-sensitive snippets needed to reproduce.
      render: text
    validations:
      required: false
