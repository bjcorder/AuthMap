name: codeql

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "23 9 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: rust
          config-file: ./.github/codeql/codeql-config.yml
      - uses: github/codeql-action/analyze@v4
