name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  prepare:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      tag: ${{ steps.release-context.outputs.tag }}
      version: ${{ steps.release-context.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - id: release-context
        name: Validate release tag and workspace version
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          tag="${REF_NAME}"
          case "${tag}" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "Release tag must look like vMAJOR.MINOR.PATCH" >&2; exit 1 ;;
          esac

          version="$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json,sys; data=json.load(sys.stdin); print(next(p["version"] for p in data["packages"] if p["name"] == "authmap-cli"))')"
          if [ "${tag#v}" != "${version}" ]; then
            echo "Tag ${tag} does not match workspace package version ${version}" >&2
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

  build:
    name: Build ${{ matrix.os }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        os:
          - blacksmith-4vcpu-ubuntu-2404
          - blacksmith-6vcpu-macos-latest
          - blacksmith-4vcpu-windows-2025
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TERM_COLOR: always
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: "1.95"
      - name: Test workspace
        run: cargo test --workspace --all-targets --locked
      - name: Build CLI
        run: cargo build --package authmap-cli --bin authmap --release --locked
      - name: Package artifact
        id: package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist package
          host="$(rustc -vV | awk '/^host: / { print $2 }')"
          base="authmap-${RELEASE_VERSION}-${host}"
          mkdir -p "package/${base}"
          cp README.md LICENSE "package/${base}/"
          if [ "${RUNNER_OS}" = "Windows" ]; then
            cp target/release/authmap.exe "package/${base}/authmap.exe"
            (cd package && powershell -NoProfile -Command "Compress-Archive -Path '${base}' -DestinationPath '../dist/${base}.zip' -Force")
            artifact="dist/${base}.zip"
          else
            cp target/release/authmap "package/${base}/authmap"
            tar -C package -czf "dist/${base}.tar.gz" "${base}"
            artifact="dist/${base}.tar.gz"
          fi
          echo "artifact=${artifact}" >> "${GITHUB_OUTPUT}"
      - name: Smoke test packaged CLI
        shell: bash
        env:
          ARTIFACT: ${{ steps.package.outputs.artifact }}
        run: |
          set -euo pipefail
          smoke_dir="${RUNNER_TEMP}/authmap-release-smoke"
          rm -rf "${smoke_dir}"
          mkdir -p "${smoke_dir}"
          if [ "${RUNNER_OS}" = "Windows" ]; then
            powershell -NoProfile -Command "Expand-Archive -Path '${ARTIFACT}' -DestinationPath '${smoke_dir}' -Force"
            authmap_bin="$(find "${smoke_dir}" -name authmap.exe -type f | head -n 1)"
          else
            tar -C "${smoke_dir}" -xzf "${ARTIFACT}"
            authmap_bin="$(find "${smoke_dir}" -name authmap -type f | head -n 1)"
          fi
          if [ -z "${authmap_bin}" ]; then
            echo "packaged authmap binary was not found" >&2
            exit 1
          fi
          "${authmap_bin}" --help
          "${authmap_bin}" --version

          report_dir="${smoke_dir}/reports"
          mkdir -p "${report_dir}"
          "${authmap_bin}" scan tests/fixtures/negative/frontend_only --format json --output "${report_dir}/authmap.json"
          "${authmap_bin}" scan tests/fixtures/negative/frontend_only --format markdown --output "${report_dir}/authmap.md"
          "${authmap_bin}" scan tests/fixtures/negative/frontend_only --format sarif --output "${report_dir}/authmap.sarif"
          "${authmap_bin}" baseline create tests/fixtures/negative/frontend_only --output "${report_dir}/authmap.baseline.json"
          "${authmap_bin}" diff --base "${report_dir}/authmap.baseline.json" --head "${report_dir}/authmap.json" --format json --output "${report_dir}/authmap.diff.json"
      - name: Upload release archive to workflow
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-archive-${{ matrix.os }}
          path: ${{ steps.package.outputs.artifact }}
          retention-days: 7
          if-no-files-found: error

  source:
    name: Build source archive
    needs: prepare
    runs-on: blacksmith-4vcpu-ubuntu-2404
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}
      - name: Assemble source tarball
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          git archive --format=tar.gz --prefix="authmap-${VERSION}-source/" \
            -o "dist/authmap-${VERSION}-source.tar.gz" "${RELEASE_TAG}"
      - name: Upload source archive to workflow
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-archive-source
          path: dist/authmap-${{ env.VERSION }}-source.tar.gz
          retention-days: 7
          if-no-files-found: error

  subjects:
    name: Compute release subjects
    needs:
      - prepare
      - build
      - source
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
      version: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Download release archives
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: release-archive-*
          path: dist
          merge-multiple: true
      - name: Generate SHA-256 sidecars and SLSA subjects
        id: hash
        shell: bash
        working-directory: dist
        run: |
          set -euo pipefail
          for artifact in authmap-*; do
            case "${artifact}" in
              *.tar.gz|*.zip) sha256sum "$artifact" > "$artifact.sha256" ;;
            esac
          done
          hashes="$(for artifact in authmap-*; do case "${artifact}" in *.tar.gz|*.zip) sha256sum "$artifact" ;; esac; done | base64 -w0)"
          echo "hashes=${hashes}" >> "${GITHUB_OUTPUT}"
      - name: Upload checksum sidecars to workflow
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-checksums
          path: dist/*.sha256
          retention-days: 7
          if-no-files-found: error

  provenance:
    name: Generate SLSA provenance
    needs: subjects
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@5a775b367a56d5bd118a224a811bba288150a563
    with:
      base64-subjects: ${{ needs.subjects.outputs.hashes }}
      upload-assets: true
      provenance-name: authmap-${{ needs.subjects.outputs.version }}.intoto.jsonl

  release:
    name: Publish GitHub release
    needs:
      - prepare
      - build
      - source
      - subjects
      - provenance
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - name: Download release archives
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: release-archive-*
          path: dist
          merge-multiple: true
      - name: Download checksum sidecars
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: release-checksums
          path: dist
      - name: Extract release notes from CHANGELOG.md
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          python3 - <<'PY' > release-notes.md
          from pathlib import Path
          import os
          import re
          import sys

          version = os.environ["VERSION"]
          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
          pattern = re.compile(rf"^## {re.escape(version)}(?:\\s+-.*)?$", re.MULTILINE)
          match = pattern.search(changelog)
          if not match:
              print(f"CHANGELOG.md does not contain a section for {version}", file=sys.stderr)
              sys.exit(1)
          next_match = re.search(r"^## ", changelog[match.end():], re.MULTILINE)
          end = match.end() + next_match.start() if next_match else len(changelog)
          notes = changelog[match.end():end].strip()
          if not notes:
              print(f"CHANGELOG.md section for {version} is empty", file=sys.stderr)
              sys.exit(1)
          print(notes)
          PY
      - name: Create or update GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: AuthMap ${{ needs.prepare.outputs.version }}
          body_path: release-notes.md
          files: |
            dist/authmap-*
            dist/*.sha256
          draft: false
          prerelease: ${{ contains(needs.prepare.outputs.tag, '-') }}
          fail_on_unmatched_files: true
