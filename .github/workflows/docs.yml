name: docs

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  markdown-smoke:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Verify expected docs exist
        run: |
          test -s README.md
          test -s CHANGELOG.md
          test -s docs/PRODUCT_BRIEF.md
          test -s docs/ARCHITECTURE.md
          test -s docs/GITHUB_ACTION.md
          test -s docs/ROADMAP.md
          test -s docs/SUPPLY_CHAIN.md
          test -s docs/RELEASES.md
          test -s SECURITY.md
          test -s CONTRIBUTING.md
