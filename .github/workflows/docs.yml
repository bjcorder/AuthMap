name: docs

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  markdown-smoke:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Verify expected docs exist
        run: |
          test -s README.md
          test -s CHANGELOG.md
          test -s docs/PRODUCT_BRIEF.md
          test -s docs/ARCHITECTURE.md
          test -s docs/GITHUB_ACTION.md
          test -s docs/ROADMAP.md
          test -s docs/SUPPLY_CHAIN.md
          test -s docs/RELEASES.md
          test -s SECURITY.md
          test -s CONTRIBUTING.md
