name: docs

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  markdown-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify expected docs exist
        run: |
          test -s README.md
          test -s docs/PRODUCT_BRIEF.md
          test -s docs/ARCHITECTURE.md
          test -s docs/ROADMAP.md
          test -s SECURITY.md
          test -s CONTRIBUTING.md
